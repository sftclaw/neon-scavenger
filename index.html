<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Scavenger ⚡</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #050505; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,5,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .hidden { display: none !important; }
        h1 { font-size: 2.5rem; color: #0ea5e9; text-shadow: 0 0 20px #0ea5e9; margin-bottom: 10px; }
        p { color: #94a3b8; max-width: 300px; margin-bottom: 20px; }
        button { padding: 15px 40px; font-size: 1.2rem; background: #0ea5e9; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #ui-layer { position: fixed; top: 20px; left: 20px; right: 20px; color: white; pointer-events: none; z-index: 50; display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="intro-screen" class="overlay">
        <h1>NEON SCAVENGER</h1>
        <p>Tap Blue. Avoid Red. Survive.</p>
        <button onclick="startGame()">START</button>
    </div>
    <div id="game-over" class="overlay hidden">
        <h1 style="color: #ef4444;">SYSTEM FAILURE</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()">REBOOT</button>
    </div>
    <div id="ui-layer" class="hidden">
        <div>SCORE: <span id="score">0</span></div>
        <div>HP: <span id="hp">100</span>%</div>
    </div>

    <script>
        let gameScene;
        function startGame() {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            new Phaser.Game({
                type: Phaser.AUTO, 
                width: window.innerWidth, 
                height: window.innerHeight,
                parent: 'game-container', 
                backgroundColor: '#050505',
                physics: { 
                    default: 'arcade', 
                    arcade: { debug: false, gravity: { y: 0 } } 
                },
                scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
                scene: { create: create, update: update }
            });
        }

        function create() {
            gameScene = this;
            this.score = 0; this.hp = 100; this.heat = 1;
            this.items = this.physics.add.group();
            this.lastSpawn = 0;
            this.spawnDelay = 800;

            // Create textures for performance
            const loottex = this.make.graphics({x:0,y:0,add:false});
            loottex.fillStyle(0x0ea5e9, 1); loottex.fillCircle(20,20,20); loottex.generateTexture('loot', 40, 40);
            
            const virustex = this.make.graphics({x:0,y:0,add:false});
            virustex.fillStyle(0xef4444, 1); virustex.fillRect(10,10,20,20); virustex.generateTexture('virus', 40, 40);

            // Particle Texture
            const p = this.make.graphics({x:0,y:0,add:false});
            p.fillStyle(0xffffff); p.fillCircle(4,4,4); p.generateTexture('particle',8,8);
            this.emitter = this.add.particles(0,0,'particle',{ speed:100, scale:{start:1,end:0}, blendMode:'ADD', lifespan:400, on:false });

            this.input.on('gameobjectdown', (pointer, item) => {
                if(!item.active) return;
                if(item.getData('type') === 'virus') {
                    this.hp -= 20; 
                    this.cameras.main.shake(100, 0.02);
                } else {
                    this.score += 50;
                    this.emitter.emitParticleAt(item.x, item.y, 10);
                }
                item.destroy();
                updateUI();
                if(this.hp <= 0) {
                    this.scene.pause();
                    document.getElementById('game-over').classList.remove('hidden');
                    document.getElementById('final-score').innerText = this.score;
                }
            });
        }

        function update(time) {
            if(!gameScene || this.scene.isPaused()) return;
            
            if(time > this.lastSpawn + this.spawnDelay) {
                spawnItem.call(this);
                this.lastSpawn = time;
                this.heat += 0.02;
                this.spawnDelay = Math.max(200, 800 / this.heat);
            }
        }

        function spawnItem() {
            const w = this.scale.width;
            const h = this.scale.height;
            const type = Math.random() > 0.8 ? 'virus' : 'loot';
            
            // Spawn in the center area to avoid edge sticking
            const x = Phaser.Math.Between(w * 0.1, w * 0.9);
            const y = Phaser.Math.Between(h * 0.1, h * 0.9);

            const item = this.items.create(x, y, type === 'loot' ? 'loot' : 'virus');
            item.setData('type', type);
            item.setInteractive({ hitArea: new Phaser.Geom.Circle(20,20,20), hitAreaCallback: Phaser.Geom.Circle.Contains });
            
            // Give it a random push
            item.setVelocity(Phaser.Math.Between(-100,100), Phaser.Math.Between(-100,100));
            item.setAngularVelocity(Phaser.Math.Between(-50,50)); // Add some spin
            item.setCollideWorldBounds(true);
            item.setBounce(1);

            // Auto-destroy after 3 seconds
            this.time.delayedCall(3000 / this.heat, () => {
                if(item.active) item.destroy();
            });
        }

        function updateUI() {
            if(!gameScene) return;
            document.getElementById('score').innerText = gameScene.score;
            document.getElementById('hp').innerText = Math.max(0, gameScene.hp);
        }
    </script>
</body>
</html>
